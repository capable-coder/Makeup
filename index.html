<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Beauty - Makeup Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff0f5;
}

header {
    background: #ff69b4;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 24px;
}

.hero {
    text-align: center;
    padding: 50px;
}

.hero h1 {
    font-size: 40px;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    margin: 15px;
    padding: 15px;
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #ff69b4;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 5px;
}

footer {
    text-align: center;
    padding: 15px;
    background: #222;
    color: white;
}
</style>

</head>

<body>

<header>
💄 Glow Beauty Store
</header>

<section class="hero">
<h1>Enhance Your Beauty</h1>
<p>Best makeup products at affordable prices</p>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Lipstick</h3>
<p>₹299</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Foundation</h3>
<p>₹599</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Eye Palette</h3>
<p>₹799</p>
<button>Buy Now</button>
</div>

</section>

<footer>
© 2026 Glow Beauty
</footer>

</body>
</html>
