<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Glow Makeup Studio</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#fff;
overflow-x:hidden;
}

/* NAVBAR */
nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.4);
color:#fff;
z-index:1000;
backdrop-filter:blur(10px);
}

nav h2{
letter-spacing:2px;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav ul li{
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9") center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
top:0;
left:0;
}

.hero-content{
position:relative;
animation:fadeUp 1.5s ease;
}

.hero h1{
font-size:60px;
letter-spacing:3px;
}

.hero p{
margin:20px 0;
font-size:18px;
}

.btn{
padding:12px 30px;
border:2px solid white;
color:white;
text-decoration:none;
transition:0.4s;
}

.btn:hover{
background:white;
color:black;
}

/* SECTION */
section{
padding:80px 10%;
}

.title{
text-align:center;
font-size:30px;
margin-bottom:40px;
}

/* SERVICES */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
padding:20px;
background:#fff;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
border-radius:10px;
transition:0.4s;
transform:translateY(50px);
opacity:0;
}

.card.show{
transform:translateY(0);
opacity:1;
}

.card:hover{
transform:scale(1.05);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1);
}

/* FOOTER */
footer{
background:black;
color:white;
text-align:center;
padding:20px;
}

/* ANIMATION */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<nav>
<h2>GLOW</h2>
<ul>
<li>Home</li>
<li>Services</li>
<li>Gallery</li>
</ul>
</nav>

<section class="hero">
<div class="hero-content">
<h1>CLASSY BRIDES</h1>
<p>Beautiful and natural bridal makeup</p>
<a href="#services" class="btn">Explore</a>
</div>
</section>

<section id="services">
<h2 class="title">Our Services</h2>

<div class="cards">
<div class="card">Bridal Makeup</div>
<div class="card">Party Makeup</div>
<div class="card">HD Makeup</div>
<div class="card">Hair Styling</div>
</div>

</section>

<section>
<h2 class="title">Gallery</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
<img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796">
<img src="https://images.unsplash.com/photo-1526045612212-70caf35c14df">
<img src="https://images.unsplash.com/photo-1500840216050-6ffa99d75160">
</div>

</section>

<footer>
© 2026 Glow Makeup Studio
</footer>

<script>

/* SCROLL ANIMATION */
let cards = document.querySelectorAll(".card");

window.addEventListener("scroll", ()=>{
let trigger = window.innerHeight * 0.8;

cards.forEach(card=>{
let top = card.getBoundingClientRect().top;

if(top < trigger){
card.classList.add("show");
}
});
});

</script>

</body>
</html>
